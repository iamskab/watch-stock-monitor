name: Watch Stock Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
    - cron: '30 6 * * *'    # 12:00 PM IST daily (06:30 UTC)
  workflow_dispatch:  # Manual trigger

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: stock_state.json
          key: stock-state-${{ github.run_id }}
          restore-keys: |
            stock-state-

      - name: Check if daily summary
        id: check-summary
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "06" ] && [ "$MIN" -ge "25" ] && [ "$MIN" -le "40" ]; then
            echo "DAILY_SUMMARY=true" >> $GITHUB_ENV
          else
            echo "DAILY_SUMMARY=false" >> $GITHUB_ENV
          fi

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAILY_SUMMARY: ${{ env.DAILY_SUMMARY }}
        run: python monitor.py

      - name: Save state
        uses: actions/cache/save@v4
        with:
          path: stock_state.json
          key: stock-state-${{ github.run_id }}
